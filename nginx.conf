server {
    listen 80;
    server_name localhost;

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Helper to avoid repetition
    set $cors_origin "*";
    set $cors_methods "GET, POST, OPTIONS, PUT, DELETE, PATCH";
    set $cors_headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";

    # Auth Service
    location ~ ^/api/v1/auth {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' $cors_methods always;
            add_header 'Access-Control-Allow-Headers' $cors_headers always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # Standard CORS for actual responses
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' $cors_methods always;
        add_header 'Access-Control-Allow-Headers' $cors_headers always;

        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Patient Service
    location ~ ^/api/v1/patients {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' $cors_methods always;
            add_header 'Access-Control-Allow-Headers' $cors_headers always;
            return 204;
        }
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        proxy_pass http://127.0.0.1:8002;
    }

    # Doctor Service
    location ~ ^/api/v1/doctors {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            return 204;
        }
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        proxy_pass http://127.0.0.1:8003;
    }

    location ~ ^/api/v1/availability {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            return 204;
        }
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        proxy_pass http://127.0.0.1:8003;
    }

    # Appointment Service
    location ~ ^/api/v1/appointments {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            return 204;
        }
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        proxy_pass http://127.0.0.1:8004;
    }

    # Telemedicine Service
    location ~ ^/api/v1/sessions {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            return 204;
        }
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        proxy_pass http://127.0.0.1:8005;
    }

    # Payment Service
    location ~ ^/api/v1/payments {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            return 204;
        }
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        proxy_pass http://127.0.0.1:8006;
    }

    # Notification Service
    location ~ ^/api/v1/notifications {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            return 204;
        }
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        proxy_pass http://127.0.0.1:8007;
    }

    # AI Symptom Service
    location ~ ^/api/v1/symptoms {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            return 204;
        }
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        proxy_pass http://127.0.0.1:8008;
    }

    # Gateway fallback
    location / {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            return 204;
        }
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
