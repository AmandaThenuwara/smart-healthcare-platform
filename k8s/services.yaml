# =====================================================================
#  Appointment + Telemedicine + Payment + Notification + AI Symptom
#  Services – Kubernetes Deployments + Services
# =====================================================================

# ── Appointment Service ───────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
  namespace: healthcare
  labels:
    app: appointment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
    spec:
      containers:
        - name: appointment-service
          image: ghcr.io/YOUR_GITHUB_ORG/appointment-service:latest
          ports:
            - containerPort: 8004
          env:
            - name: PORT
              value: "8004"
            - name: APP_NAME
              value: "appointment-service"
            - name: DATABASE_NAME
              value: "appointment_db"
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: healthcare-config
                  key: CORS_ORIGINS
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: MONGO_URI
            - name: MONGO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: MONGO_USERNAME
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: MONGO_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: appointment-service
  namespace: healthcare
spec:
  selector:
    app: appointment-service
  ports:
    - protocol: TCP
      port: 8004
      targetPort: 8004
  type: ClusterIP

