server {
    listen 80;
    server_name localhost;

    # Increase timeouts for slow startup
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Auth Service - matches /api/v1/auth and /api/v1/auth/anything
    location ~ ^/api/v1/auth {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Patient Service
    location ~ ^/api/v1/patients {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Doctor Service
    location ~ ^/api/v1/doctors {
        proxy_pass http://127.0.0.1:8003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location ~ ^/api/v1/availability {
        proxy_pass http://127.0.0.1:8003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Appointment Service
    location ~ ^/api/v1/appointments {
        proxy_pass http://127.0.0.1:8004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Telemedicine Service
    location ~ ^/api/v1/sessions {
        proxy_pass http://127.0.0.1:8005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Payment Service
    location ~ ^/api/v1/payments {
        proxy_pass http://127.0.0.1:8006;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Notification Service
    location ~ ^/api/v1/notifications {
        proxy_pass http://127.0.0.1:8007;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # AI Symptom Service
    location ~ ^/api/v1/symptoms {
        proxy_pass http://127.0.0.1:8008;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Gateway - fallback for health checks etc.
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
