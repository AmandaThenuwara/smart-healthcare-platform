# =====================================================================
#  Kubernetes ConfigMap – Non-sensitive shared configuration
#  Update CORS_ORIGINS with your actual Vercel production URL
# =====================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: healthcare-config
  namespace: healthcare
data:
  MONGO_AUTH_SOURCE: "admin"
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  # ⚠️  Replace with your actual Vercel URL after deployment
  CORS_ORIGINS: "https://your-app.vercel.app,http://localhost:5173"
