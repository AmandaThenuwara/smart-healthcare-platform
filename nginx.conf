server {
    listen 80;
    server_name localhost;

    # Helper for CORS Preflight
    location / {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Auth Service
    location ~ ^/api/v1/auth(.*)$ {
        proxy_pass http://127.0.0.1:8001/api/v1/auth$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Patient Service
    location ~ ^/api/v1/patients(.*)$ {
        proxy_pass http://127.0.0.1:8002/api/v1/patients$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Doctor Service
    location ~ ^/api/v1/doctors(.*)$ {
        proxy_pass http://127.0.0.1:8003/api/v1/doctors$1;
        proxy_set_header Host $host;
    }

    location ~ ^/api/v1/availability(.*)$ {
        proxy_pass http://127.0.0.1:8003/api/v1/availability$1;
        proxy_set_header Host $host;
    }

    # Appointment Service
    location ~ ^/api/v1/appointments(.*)$ {
        proxy_pass http://127.0.0.1:8004/api/v1/appointments$1;
        proxy_set_header Host $host;
    }

    # Telemedicine Service
    location ~ ^/api/v1/sessions(.*)$ {
        proxy_pass http://127.0.0.1:8005/api/v1/sessions$1;
        proxy_set_header Host $host;
    }

    # Payment Service
    location ~ ^/api/v1/payments(.*)$ {
        proxy_pass http://127.0.0.1:8006/api/v1/payments$1;
        proxy_set_header Host $host;
    }

    # Notification Service
    location ~ ^/api/v1/notifications(.*)$ {
        proxy_pass http://127.0.0.1:8007/api/v1/notifications$1;
        proxy_set_header Host $host;
    }

    # AI Symptom Service
    location ~ ^/api/v1/symptoms(.*)$ {
        proxy_pass http://127.0.0.1:8008/api/v1/symptoms$1;
        proxy_set_header Host $host;
    }
}
