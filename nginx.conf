server {
    listen 80;
    server_name localhost;

    # Auth Service
    location /api/v1/auth/ {
        proxy_pass http://127.0.0.1:8001/api/v1/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Patient Service
    location /api/v1/patients/ {
        proxy_pass http://127.0.0.1:8002/api/v1/patients/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Doctor Service
    location /api/v1/doctors/ {
        proxy_pass http://127.0.0.1:8003/api/v1/doctors/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/availability/ {
        proxy_pass http://127.0.0.1:8003/api/v1/availability/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Appointment Service
    location /api/v1/appointments/ {
        proxy_pass http://127.0.0.1:8004/api/v1/appointments/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Telemedicine Service (Sessions)
    location /api/v1/sessions/ {
        proxy_pass http://127.0.0.1:8005/api/v1/sessions/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Payment Service
    location /api/v1/payments/ {
        proxy_pass http://127.0.0.1:8006/api/v1/payments/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Notification Service
    location /api/v1/notifications/ {
        proxy_pass http://127.0.0.1:8007/api/v1/notifications/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # AI Symptom Service
    location /api/v1/symptoms/ {
        proxy_pass http://127.0.0.1:8008/api/v1/symptoms/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Default fallback to Gateway (Port 8000)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
