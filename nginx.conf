server {
    listen 80;
    server_name localhost;

    # Global CORS (Handles OPTIONS before it hits the app)
    location / {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept,Origin,User-Agent,DNT,Cache-Control,X-Mx-ReqToken,Keep-Alive,X-Requested-With,If-Modified-Since' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Pass everything for /api/v1/auth/ directly to the auth service
    location /api/v1/auth/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/patients/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
    }

    location /api/v1/doctors/ {
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
    }

    location /api/v1/appointments/ {
        proxy_pass http://127.0.0.1:8004;
        proxy_set_header Host $host;
    }

    location /api/v1/sessions/ {
        proxy_pass http://127.0.0.1:8005;
        proxy_set_header Host $host;
    }

    location /api/v1/payments/ {
        proxy_pass http://127.0.0.1:8006;
        proxy_set_header Host $host;
    }

    location /api/v1/notifications/ {
        proxy_pass http://127.0.0.1:8007;
        proxy_set_header Host $host;
    }

    location /api/v1/symptoms/ {
        proxy_pass http://127.0.0.1:8008;
        proxy_set_header Host $host;
    }
}
